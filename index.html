<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lahore Biryani & Chicken Broast</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

header {
  background:#b30000;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container { padding:20px; }

.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card {
  background:#222;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Lahore Biryani & Chicken Broast</header>

<div class="container">
<h2>Menu</h2>
<div class="menu" id="menu"></div>
</div>

<script>
const supabaseUrl = "YOUR_URL";
const supabaseKey = "YOUR_KEY";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function loadMenu(){
  let { data } = await supabase.from("menu").select("*");

  let html = "";

  data.forEach(item=>{
    let finalPrice = item.price - (item.price * item.discount / 100);

    html += `
      <div class="card">
        <img src="${item.image}">
        <h3>${item.name}</h3>
        <p>Rs ${finalPrice}</p>
        <small>${item.discount}% OFF</small>
      </div>
    `;
  });

  document.getElementById("menu").innerHTML = html;
}

loadMenu();
</script>

</body>
  </html>
